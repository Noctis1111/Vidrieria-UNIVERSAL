<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Galería - VIDRIERÍA UNIVERSAL</title>
    
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet" />
    
    <link href="css/styles.css" rel="stylesheet" />
</head>
<body id="page-top">

    <div id="contenedor-menu"></div>

    <header class="masthead">
        <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
            <div class="text-center">
                <h1 class="mx-auto my-0 text-uppercase">Galería</h1>
                <a class="btn btn-primary" href="#projects">Ver Trabajos</a>
            </div>
        </div>
    </header>

    <section class="about-section text-center" id="about">
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-lg-8">
                    <h2 class="text-white mb-4">Ventanas Sistema</h2>
                </div>
            </div>
            <img class="img-fluid" src="assets/img/ipad.png" alt="Sistema" />
        </div>
    </section>

    <section class="projects-section bg-light" id="projects">
        <div class="container px-4 px-lg-5">
            
            <div class="row gx-0 mb-4 mb-lg-5">
                <div class="col-lg-8 bg-primary p-4">
                    <div class="row">
                        <div class="col-6 mb-3">
                            <img class="img-fluid border" src="assets/img/FB_IMG_1617319998186.jpg" alt="Trabajo Real" />
                        </div>
                        <div class="col-6 mb-3">
                            <img class="img-fluid border" src="assets/img/bg-masthead.jpg" alt="..." />
                        </div>
                        <div class="col-6">
                            <img class="img-fluid border" src="assets/img/bg-masthead.jpg" alt="..." />
                        </div>
                        <div class="col-6">
                            <img class="img-fluid border" src="assets/img/bg-masthead.jpg" alt="..." />
                        </div>
                    </div>
                </div>
                <div class="col-lg-4 bg-secondary d-flex align-items-center">
                    <div class="p-5 text-center text-lg-left">
                        <h3 class="text-white text-uppercase">Ventanas Sistema</h3>
                        <p class="text-white-50">Acabados en aluminio de alta resistencia.</p>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <section class="signup-section" id="signup">
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5">
                <div class="col-md-10 col-lg-8 mx-auto text-center">
                    <i class="far fa-paper-plane fa-2x mb-2 text-white"></i>
                    <h2 class="text-white mb-5">Consultas</h2>
                    <form class="form-signup">
                        <div class="row input-group-newsletter">
                            <div class="col"><input class="form-control" type="email" placeholder="Escríbenos..." /></div>
                            <div class="col-auto"><button class="btn btn-primary" type="submit">Notificarme</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div id="contenedor-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu-dinamico.js"></script>
    <script src="footer-dinamico.js"></script>

</body>
</html>
