<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Vidrios - VIDRIERÍA UNIVERSAL</title>
    
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    
    <style>
            body {
	    display: flex;
	    flex-direction: column;
	    min-height: 211vh;
		}
		#contenedor-footer {
		    margin-top: auto;
		}
	
        body {
            background-color: #000;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.8) 50%, #000 100%), 
                        url("assets/img/bg-masthead.jpg");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            font-family: 'Varela Round', sans-serif;
        }

        header.masthead {
            background: transparent !important;
            height: 25vh !important;
            min-height: 200px !important;
            padding-top: 80px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header.masthead h1 {
            font-size: 4rem !important;
            letter-spacing: 0.5rem;
            margin-top: 20px !important;
            position: relative;
            z-index: 50;
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.2));
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .card-custom { 
            background: rgba(0, 0, 0, 0.85) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white !important;
        }

        .section-subida {
            position: relative;
            z-index: 10;
            padding-bottom: 5rem;
        }

        .btn-primary { background-color: #64a19d; border-color: #64a19d; }
        .btn-primary:disabled { background-color: #3e5a58; border-color: #3e5a58; opacity: 0.5; }
        .btn-outline-primary { color: #64a19d; border-color: #64a19d; font-size: 0.85rem; }
        .btn-check:checked + .btn-outline-primary { background-color: #64a19d !important; color: white !important; }
        
        .btn-outline-warning { color: #ffc107; border-color: #ffc107; }
        .btn-check:checked + .btn-outline-warning { background-color: #ffc107 !important; color: black !important; }
        .btn-outline-info { color: #0dcaf0; border-color: #0dcaf0; }
        .btn-check:checked + .btn-outline-info { background-color: #0dcaf0 !important; color: black !important; }

        .form-control { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; }
        
        /* ESTILO DE ALERTA PROTOCOLO "VITRINAS" */
        #mensaje-error-config {
            border: 1px dashed #64a19d;
            background: rgba(100, 161, 157, 0.1);
            border-radius: 10px;
        }

        .resumen-titulo { 
            font-size: 0.8rem; 
            color: #64a19d; 
            border-bottom: 1px solid #333; 
            padding-bottom: 3px; 
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #64a19d; border-radius: 10px; }
    </style>
</head>
<body id="page-top">

    <div id="contenedor-menu"></div>

    <header class="masthead">
        <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
            <div class="text-center">
                <h1 class="mx-auto my-0 text-uppercase">Vidrios</h1>
            </div>
        </div>
    </header>

    <section class="container px-4 px-lg-5 section-subida">
        <div class="row gx-5">
            <div class="col-md-6 mb-4">
                <div class="card card-custom p-4 shadow">
                    <h4 class="text-white text-center mb-4">Configurar Vidrio</h4>
                    
                    <div id="wrapper-calculo">
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label text-white-50 small">Altura (cm):</label>
                                <input type="number" class="form-control form-control-lg" id="altura" placeholder="0">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label text-white-50 small">Ancho (cm):</label>
                                <input type="number" class="form-control form-control-lg" id="ancho" placeholder="0">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-white-50 small d-block mb-2">Cantidad de vidrios:</label>
                            <input type="number" class="form-control form-control-lg" id="cantidad" placeholder="1" min="1">
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-white-50 small d-block mb-3">Modo de Venta:</label>
                            <div class="d-flex gap-2">
                                <input type="radio" class="btn-check" name="modoVenta" id="modoReparacion" value="reparacion" checked onchange="actualizarPreciosBotones()">
                                <label class="btn btn-outline-warning btn-sm w-50" for="modoReparacion">🛠️ Reparación</label>

                                <input type="radio" class="btn-check" name="modoVenta" id="modoVentaSolo" value="solo" onchange="actualizarPreciosBotones()">
                                <label class="btn btn-outline-info btn-sm w-50" for="modoVentaSolo">📦 Solo Vidrio</label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-white-50 small d-block mb-3">Seleccione Tipo:</label>
                            <div class="d-flex flex-wrap gap-2" id="contenedorVidrios"></div>
                        </div>

                        <div id="mensaje-error-config" class="p-3 text-center d-none mb-4">
                            <p class="text-white small mb-2">Faltan precios en la configuración.</p>
                            <button class="btn btn-primary w-100 fw-bold" onclick="window.location.href='config.html'">Configurar</button>
                        </div>

                        <div class="text-center mb-4">
                            <h5 class="text-white bg-black p-3 rounded border border-secondary" id="resultado">Costo: S/. 0.00</h5>
                        </div>
                        
                        <div class="d-grid">
                            <button id="btn-anadir" class="btn btn-primary btn-lg text-uppercase fw-bold" onclick="guardar()">Añadir a Lista</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card card-custom p-4 shadow h-100">
                    <h4 class="text-white text-center mb-4">Resumen de Medidas</h4>
                    <div style="max-height: 500px; overflow-y: auto;" class="px-2">
                        <div class="resumen-seccion">
                            <div class="resumen-titulo">Vidrios Triples</div>
                            <ul id="listaTriple" class="list-unstyled text-white-50 small mb-2"></ul>
                        </div>
                        <div class="resumen-seccion">
                            <div class="resumen-titulo">Vidrios Dobles</div>
                            <ul id="listaDoble" class="list-unstyled text-white-50 small mb-2"></ul>
                        </div>
                        <div class="resumen-seccion">
                            <div class="resumen-titulo">Catedrales</div>
                            <ul id="listaCatedral" class="list-unstyled text-white-50 small mb-2"></ul>
                        </div>
                        <div class="resumen-seccion">
                            <div class="resumen-titulo">Espejos</div>
                            <ul id="listaEspejo" class="list-unstyled text-white-50 small mb-2"></ul>
                        </div>
                    </div>
                    <div class="mt-auto pt-3 border-top border-secondary text-center">
                        <h4 id="totalAcumulado" class="text-white fw-bold">Total: S/. 0.00</h4>
                        <button class="btn btn-sm btn-link text-danger mt-2 text-decoration-none" onclick="limpiar()">BORRAR TODO</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="contenedor-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu-dinamico.js"></script>
    <script src="footer-dinamico.js"></script>

    <script>
        let datos = { Triple: [], Doble: [], Catedral: [], Espejo: [] };

        function actualizarPreciosBotones() {
            const modo = document.querySelector('input[name="modoVenta"]:checked').value;
            const contenedor = document.getElementById('contenedorVidrios');
            
            const precios = {
                reparacion: {
                    t: localStorage.getItem('precio_vr1') || "0",
                    d: localStorage.getItem('precio_vr2') || "0",
                    c: localStorage.getItem('precio_vr3') || "0",
                    e: localStorage.getItem('precio_vr4') || "0"
                },
                solo: {
                    t: localStorage.getItem('precio_vs1') || "0",
                    d: localStorage.getItem('precio_vs2') || "0",
                    c: localStorage.getItem('precio_vs3') || "0",
                    e: localStorage.getItem('precio_vs4') || "0"
                }
            }[modo];

            contenedor.innerHTML = `
                <div style="flex:1; min-width: 45%;">
                    <input type="radio" class="btn-check" name="tipoVidrio" id="v1" value="${precios.t}" data-cat="Triple" data-nombre="Triple" onchange="seleccionarTipo()">
                    <label class="btn btn-outline-primary w-100 h-100 py-2" for="v1">Triple<br>S/ ${parseFloat(precios.t).toFixed(2)}</label>
                </div>
                <div style="flex:1; min-width: 45%;">
                    <input type="radio" class="btn-check" name="tipoVidrio" id="v2" value="${precios.d}" data-cat="Doble" data-nombre="Doble" onchange="seleccionarTipo()">
                    <label class="btn btn-outline-primary w-100 h-100 py-2" for="v2">Doble - Catedral<br>S/ ${parseFloat(precios.d).toFixed(2)}</label>
                </div>
                <div style="flex:1; min-width: 45%;">
                    <input type="radio" class="btn-check" name="tipoVidrio" id="v3" value="${precios.c}" data-cat="Catedral" data-nombre="Catedral" onchange="seleccionarTipo()">
                    <label class="btn btn-outline-primary w-100 h-100 py-2" for="v3">Catedral<br>S/ ${parseFloat(precios.c).toFixed(2)}</label>
                </div>
                <div style="flex:1; min-width: 45%;">
                    <input type="radio" class="btn-check" name="tipoVidrio" id="v4" value="${precios.e}" data-cat="Espejo" data-nombre="Espejo" onchange="seleccionarTipo()">
                    <label class="btn btn-outline-primary w-100 h-100 py-2" for="v4">Espejo<br>S/ ${parseFloat(precios.e).toFixed(2)}</label>
                </div>
            `;

            // SELECCIÓN POR DEFECTO PROTOCOLO
            document.getElementById('v1').checked = true;
            seleccionarTipo();
        }

        function seleccionarTipo() {
            const seleccionado = document.querySelector('input[name="tipoVidrio"]:checked');
            const precio = parseFloat(seleccionado.value);
            const mensajeError = document.getElementById('mensaje-error-config');
            const btnAnadir = document.getElementById('btn-anadir');

            if (precio > 0) {
                mensajeError.classList.add('d-none');
                btnAnadir.disabled = false;
                recalcular();
            } else {
                mensajeError.classList.remove('d-none');
                btnAnadir.disabled = true;
                document.getElementById('resultado').innerHTML = "Costo: S/. 0.00";
            }
        }

        function calcular() {
            const h = parseFloat(document.getElementById('altura').value);
            const a = parseFloat(document.getElementById('ancho').value);
            const seleccionado = document.querySelector('input[name="tipoVidrio"]:checked');
            let cantInput = document.getElementById('cantidad').value;
            let cantidad = cantInput === "" ? 1 : parseInt(cantInput);
            
            const precioBase = parseFloat(seleccionado.value);
            if (!h || !a || h <= 0 || a <= 0 || !precioBase) return null;

            const costoUnitario = ((h * a) / 900) * precioBase;
            return { 
                h, a, costo: costoUnitario * cantidad, cantidad,
                categoria: seleccionado.getAttribute('data-cat'), 
                nombre: seleccionado.getAttribute('data-nombre') 
            };
        }

        function recalcular() {
            const m = calcular();
            document.getElementById('resultado').innerHTML = m ? `Costo: S/. ${m.costo.toFixed(2)}` : "Costo: S/. 0.00";
        }

        document.getElementById('altura').addEventListener('input', recalcular);
        document.getElementById('ancho').addEventListener('input', recalcular);
        document.getElementById('cantidad').addEventListener('input', recalcular);

        function guardar() {
            const m = calcular();
            if (m) {
                const modoLabel = document.querySelector('input[name="modoVenta"]:checked').value === 'reparacion' ? '🛠️' : '📦';
                datos[m.categoria].push({...m, icono: modoLabel});
                actualizarInterfaz();
                // FOCO Y PERSISTENCIA SEGÚN PROTOCOLO (No borra medidas, solo hace focus)
                document.getElementById('altura').focus();
            }
        }

        function actualizarInterfaz() {
            ['Triple', 'Doble', 'Catedral', 'Espejo'].forEach(cat => {
                const ul = document.getElementById(`lista${cat}`);
                ul.innerHTML = '';
                datos[cat].forEach((item, i) => {
                    const li = document.createElement('li');
                    li.className = "d-flex justify-content-between border-bottom border-dark py-1";
                    const textoCantidad = item.cantidad > 1 ? ` <span class="text-warning">(x${item.cantidad})</span>` : '';
                    li.innerHTML = `<span>${i+1}. ${item.icono} ${item.a}x${item.h}cm${textoCantidad}</span> <span>S/. ${item.costo.toFixed(2)}</span>`;
                    ul.appendChild(li);
                });
            });
            const total = Object.values(datos).flat().reduce((acc, curr) => acc + curr.costo, 0);
            document.getElementById('totalAcumulado').innerHTML = `Total: S/. ${total.toFixed(2)}`;
        }

        function limpiar() {
            if(confirm("¿Vaciar todas las listas?")) {
                datos = { Triple: [], Doble: [], Catedral: [], Espejo: [] };
                actualizarInterfaz();
            }
        }

        // Manejo de teclado para redirección si hay error
        document.addEventListener('keydown', (e) => {
            const errorVisible = !document.getElementById('mensaje-error-config').classList.contains('d-none');
            if (errorVisible && (e.key === 'Enter' || e.key === ' ')) {
                window.location.href = 'config.html';
            }
        });

        window.onload = actualizarPreciosBotones;
    </script>
</body>
</html>
