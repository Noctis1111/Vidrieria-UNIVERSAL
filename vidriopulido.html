<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Vidrio Pulido - VIDRIERÍA UNIVERSAL</title>
    
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    
    <style>
        body {
            background-color: #000;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.8) 50%, #000 100%), 
                        url("assets/img/bg-masthead.jpg");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            font-family: 'Varela Round', sans-serif;
        }

        header.masthead {
            background: transparent !important;
            height: 25vh !important;
            min-height: 200px !important;
            padding-top: 80px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header.masthead h1 {
            font-size: 4rem !important;
            letter-spacing: 0.5rem;
            margin-top: 20px !important; 		/* <--- CAMBIA ESTO PARA SUBIR O BAJAR EL TÍTULO */
            position: relative;
            z-index: 50;
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.2));
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .card-custom { 
            background: rgba(0, 0, 0, 0.85) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white !important;
        }

        .section-subida {
            margin-top: -0px !important; 		/* <--- CAMBIA ESTO PARA ACERCAR O ALEJAR EL CUADRO DEL TÍTULO */
            position: relative;
            z-index: 10;
            padding-bottom: 5rem;
        }

        .btn-primary { background-color: #64a19d; border-color: #64a19d; }
        .btn-outline-primary { color: #64a19d; border-color: #64a19d; }
        .btn-check:checked + .btn-outline-primary { background-color: #64a19d !important; color: white !important; }
        
        .form-control { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; }
        
        .resumen-titulo { 
            font-size: 0.8rem; 
            color: #64a19d; 
            border-bottom: 1px solid #333; 
            padding-bottom: 3px; 
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #64a19d; border-radius: 10px; }
    </style>
</head>
<body id="page-top">

    <div id="contenedor-menu"></div>

    <header class="masthead">
        <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
            <div class="text-center">
                <h1 class="mx-auto my-0 text-uppercase">Vidrio Pulido</h1>
            </div>
        </div>
    </header>

    <section class="container px-4 px-lg-5 section-subida">
        <div class="row gx-5">
            <div class="col-md-6 mb-4">
                <div class="card card-custom p-4 shadow">
                    <h4 class="text-white text-center mb-4">Configurar Medidas</h4>
                    
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label text-white-50 small">Altura (cm):</label>
                            <input type="number" class="form-control form-control-lg" id="altura" placeholder="0">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label text-white-50 small">Ancho (cm):</label>
                            <input type="number" class="form-control form-control-lg" id="ancho" placeholder="0">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-white-50 small d-block mb-3">Seleccionar Tipo:</label>
                        <div class="d-flex gap-2 justify-content-between">
                            <input type="radio" class="btn-check" name="tipoPulido" id="btn_vp1" onchange="cargarPrecioUnidad('vp1', 'Triple')">
                            <label class="btn btn-outline-primary w-100" for="btn_vp1">Triple</label>

                            <input type="radio" class="btn-check" name="tipoPulido" id="btn_vp2" onchange="cargarPrecioUnidad('vp2', '8mm')">
                            <label class="btn btn-outline-primary w-100" for="btn_vp2">8mm</label>

                            <input type="radio" class="btn-check" name="tipoPulido" id="btn_vp3" onchange="cargarPrecioUnidad('vp3', '10mm')">
                            <label class="btn btn-outline-primary w-100" for="btn_vp3">10mm</label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-white-50 small">Precio por Unidad (S/.):</label>
                        <input type="number" step="0.01" class="form-control form-control-lg" id="precioUnidad" placeholder="0.00" oninput="recalcular()">
                    </div>

                    <div class="text-center mb-4">
                        <h5 class="text-white bg-black p-3 rounded border border-secondary" id="resultado">Costo: S/. 0.00</h5>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg text-uppercase fw-bold" onclick="guardar()">Añadir a Lista</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card card-custom p-4 shadow h-100">
                    <h4 class="text-white text-center mb-4">Lista de Pulidos</h4>
                    <div style="max-height: 450px; overflow-y: auto;" class="px-2">
                        <div class="resumen-titulo">Detalles del pedido</div>
                        <ul class="list-unstyled" id="listaPulido"></ul>
                    </div>
                    <div class="mt-auto pt-3 border-top border-secondary text-center">
                        <h4 id="totalAcumulado" class="text-white fw-bold">Total: S/. 0.00</h4>
                        <button class="btn btn-sm btn-link text-danger mt-2 text-decoration-none" onclick="limpiar()">BORRAR TODO</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="contenedor-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu-dinamico.js"></script>
    <script src="footer-dinamico.js"></script>

    <script>
        let pulidosGuardados = [];
        let nombreVidrioActual = "Pulido";

        function cargarPrecioUnidad(idConfig, nombre) {
            const precio = localStorage.getItem(`precio_${idConfig}`);
            nombreVidrioActual = nombre;
            if (precio) {
                document.getElementById('precioUnidad').value = precio;
                recalcular();
            } else {
                document.getElementById('precioUnidad').value = "0";
                alert("Configura el precio en el panel de Ajustes.");
            }
        }

        function calcular() {
            const h = parseFloat(document.getElementById('altura').value);
            const a = parseFloat(document.getElementById('ancho').value);
            const p = parseFloat(document.getElementById('precioUnidad').value);
            if (!h || !a || !p || h <= 0 || a <= 0 || p <= 0) return null;
            return { h, a, costo: ((h * a) / 900) * p, nombre: nombreVidrioActual };
        }

        function recalcular() {
            const m = calcular();
            document.getElementById('resultado').innerHTML = m ? `Costo: S/. ${m.costo.toFixed(2)}` : "Costo: S/. 0.00";
        }

        document.getElementById('altura').addEventListener('input', recalcular);
        document.getElementById('ancho').addEventListener('input', recalcular);

        function guardar() {
            const m = calcular();
            if (m) {
                pulidosGuardados.push(m);
                actualizarInterfaz();
                document.getElementById('altura').value = '';
                document.getElementById('ancho').value = '';
                document.getElementById('altura').focus();
            }
        }

        function actualizarInterfaz() {
            const ui = document.getElementById('listaPulido');
            ui.innerHTML = '';
            let total = 0;
            pulidosGuardados.forEach((item, i) => {
                total += item.costo;
                const li = document.createElement('li');
                li.className = "d-flex justify-content-between border-bottom border-dark py-2 text-white-50 small";
                li.innerHTML = `<span>${i+1}. ${item.nombre} (${item.a}x${item.h})</span> <span class="text-white">S/. ${item.costo.toFixed(2)}</span>`;
                ui.appendChild(li);
            });
            document.getElementById('totalAcumulado').innerHTML = `Total: S/. ${total.toFixed(2)}`;
        }

        function limpiar() {
            if(confirm("¿Vaciar lista?")) {
                pulidosGuardados = [];
                actualizarInterfaz();
            }
        }
    </script>
</body>
</html>
