<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Vidrio Pulido - VIDRIERÍA UNIVERSAL</title>
    
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    
    <style>
    body {
    display: flex;
    flex-direction: column;
    min-height: 211vh;
}
#contenedor-footer {
    margin-top: auto;
}
    
        body {
            background-color: #000;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.8) 50%, #000 100%), 
                        url("assets/img/bg-masthead.jpg");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            font-family: 'Varela Round', sans-serif;
        }

        header.masthead {
            background: transparent !important;
            height: 25vh !important;
            min-height: 200px !important;
            padding-top: 80px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header.masthead h1 {
            font-size: 4rem !important;
            letter-spacing: 0.5rem;
            margin-top: 20px !important;
            position: relative;
            z-index: 50;
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.2));
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .card-custom { 
            background: rgba(0, 0, 0, 0.85) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white !important;
        }

        .section-subida {
            margin-top: -0px !important;
            position: relative;
            z-index: 10;
            padding-bottom: 5rem;
        }

        .btn-primary { background-color: #64a19d; border-color: #64a19d; }
        .btn-primary:disabled { background-color: #3e5a58; border-color: #3e5a58; opacity: 0.5; }
        .btn-outline-primary { color: #64a19d; border-color: #64a19d; font-size: 0.85rem; padding: 10px 5px; }
        .btn-check:checked + .btn-outline-primary { background-color: #64a19d !important; color: white !important; }
        
        .form-control { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; }
        
        /* ESTILO DE ALERTA QUE TE GUSTA */
        #mensaje-error-config {
            border: 1px dashed #64a19d;
            background: rgba(100, 161, 157, 0.1);
            border-radius: 10px;
        }

        .resumen-titulo { 
            font-size: 0.8rem; 
            color: #64a19d; 
            border-bottom: 1px solid #333; 
            padding-bottom: 3px; 
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #64a19d; border-radius: 10px; }
        
    </style>
</head>
<body id="page-top">

    <div id="contenedor-menu"></div>

    <header class="masthead">
        <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
            <div class="text-center">
                <h1 class="mx-auto my-0 text-uppercase">Vidrio Pulido</h1>
            </div>
        </div>
    </header>

    <section class="container px-4 px-lg-5 section-subida">
        <div class="row gx-5">
            <div class="col-md-6 mb-4">
                <div class="card card-custom p-4 shadow">
                    <h4 class="text-white text-center mb-4">Configurar Medidas</h4>
                    
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label text-white-50 small">Altura (cm):</label>
                            <input type="number" class="form-control form-control-lg" id="altura" placeholder="0">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label text-white-50 small">Ancho (cm):</label>
                            <input type="number" class="form-control form-control-lg" id="ancho" placeholder="0">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-white-50 small d-block mb-3">Seleccionar Tipo:</label>
                        <div class="d-flex gap-2 justify-content-between">
                            <div style="flex:1">
                                <input type="radio" class="btn-check" name="tipoPulido" id="btn_vp1" onchange="seleccionarTipo('vp1', 'Triple')">
                                <label class="btn btn-outline-primary w-100 h-100" for="btn_vp1" id="label_vp1">Triple</label>
                            </div>
                            <div style="flex:1">
                                <input type="radio" class="btn-check" name="tipoPulido" id="btn_vp2" onchange="seleccionarTipo('vp2', '8mm')">
                                <label class="btn btn-outline-primary w-100 h-100" for="btn_vp2" id="label_vp2">8mm</label>
                            </div>
                            <div style="flex:1">
                                <input type="radio" class="btn-check" name="tipoPulido" id="btn_vp3" onchange="seleccionarTipo('vp3', '10mm')">
                                <label class="btn btn-outline-primary w-100 h-100" for="btn_vp3" id="label_vp3">10mm</label>
                            </div>
                        </div>
                    </div>

                    <div id="mensaje-error-config" class="p-3 text-center d-none mb-4">
                        <p class="text-white small mb-2">Faltan precios en la configuración.</p>
                        <button class="btn btn-primary w-100 fw-bold" onclick="window.location.href='config.html'">Configurar</button>
                    </div>

                    <div class="text-center mb-4">
                        <h5 class="text-white bg-black p-3 rounded border border-secondary" id="resultado">Costo: S/. 0.00</h5>
                    </div>

                    <div class="d-grid">
                        <button id="btn-guardar" class="btn btn-primary btn-lg text-uppercase fw-bold" onclick="guardar()" disabled>Añadir a Lista</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card card-custom p-4 shadow h-100">
                    <h4 class="text-white text-center mb-4">Lista de Pulidos</h4>
                    <div style="max-height: 450px; overflow-y: auto;" class="px-2">
                        <div class="mb-3">
                            <div class="resumen-titulo">Triple</div>
                            <ul id="listaTriple" class="list-unstyled mb-3"></ul>
                        </div>
                        <div class="mb-3">
                            <div class="resumen-titulo">8mm</div>
                            <ul id="lista8mm" class="list-unstyled mb-3"></ul>
                        </div>
                        <div class="mb-3">
                            <div class="resumen-titulo">10mm</div>
                            <ul id="lista10mm" class="list-unstyled mb-3"></ul>
                        </div>
                    </div>
                    <div class="mt-auto pt-3 border-top border-secondary text-center">
                        <h4 id="totalAcumulado" class="text-white fw-bold">Total: S/. 0.00</h4>
                        <button class="btn btn-sm btn-link text-danger mt-2 text-decoration-none" onclick="limpiar()">BORRAR TODO</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="contenedor-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu-dinamico.js"></script>
    <script src="footer-dinamico.js"></script>

    <script>
        let datosPulido = { "Triple": [], "8mm": [], "10mm": [] };
        let nombreVidrioActual = null;
        let precioActual = 0;

        window.onload = function() {
            actualizarLabelsYSeleccionar();
        };

        function actualizarLabelsYSeleccionar() {
            const configs = [
                {id: 'vp1', nombre: 'Triple'},
                {id: 'vp2', nombre: '8mm'},
                {id: 'vp3', nombre: '10mm'}
            ];

            configs.forEach(conf => {
                const precio = localStorage.getItem(`precio_${conf.id}`);
                const label = document.getElementById(`label_${conf.id}`);
                if (precio && parseFloat(precio) > 0) {
                    label.innerHTML = `${conf.nombre}<br>S/ ${parseFloat(precio).toFixed(2)}`;
                } else {
                    label.innerHTML = `${conf.nombre}<br>S/ 0.00`;
                }
            });

            // Selecciona Triple por defecto
            document.getElementById('btn_vp1').checked = true;
            seleccionarTipo('vp1', 'Triple');
        }

        function seleccionarTipo(idConfig, nombre) {
            const precio = localStorage.getItem(`precio_${idConfig}`);
            const mensajeError = document.getElementById('mensaje-error-config');
            const btnGuardar = document.getElementById('btn-guardar');
            
            nombreVidrioActual = nombre;

            if (precio && parseFloat(precio) > 0) {
                precioActual = parseFloat(precio);
                mensajeError.classList.add('d-none');
                btnGuardar.disabled = false;
                recalcular();
            } else {
                precioActual = 0;
                mensajeError.classList.remove('d-none');
                btnGuardar.disabled = true;
                document.getElementById('resultado').innerHTML = "Costo: S/. 0.00";
            }
        }

        function calcular() {
            const h = parseFloat(document.getElementById('altura').value);
            const a = parseFloat(document.getElementById('ancho').value);
            if (!h || !a || !precioActual || h <= 0 || a <= 0) return null;
            return { h, a, costo: ((h * a) / 900) * precioActual, nombre: nombreVidrioActual };
        }

        function recalcular() {
            const m = calcular();
            document.getElementById('resultado').innerHTML = m ? `Costo: S/. ${m.costo.toFixed(2)}` : "Costo: S/. 0.00";
        }

        document.getElementById('altura').addEventListener('input', recalcular);
        document.getElementById('ancho').addEventListener('input', recalcular);

        function guardar() {
            const m = calcular();
            if (m && nombreVidrioActual) {
                datosPulido[nombreVidrioActual].push(m);
                actualizarInterfaz();
                document.getElementById('altura').focus();
            }
        }

        function actualizarInterfaz() {
            const tipos = ["Triple", "8mm", "10mm"];
            let totalGeneral = 0;
            tipos.forEach(tipo => {
                const ui = document.getElementById(`lista${tipo}`);
                ui.innerHTML = '';
                datosPulido[tipo].forEach((item, i) => {
                    totalGeneral += item.costo;
                    const li = document.createElement('li');
                    li.className = "d-flex justify-content-between border-bottom border-dark py-2 text-white-50 small";
                    li.innerHTML = `<span>${i+1}. ${item.a}x${item.h}</span> <span class="text-white">S/. ${item.costo.toFixed(2)}</span>`;
                    ui.appendChild(li);
                });
            });
            document.getElementById('totalAcumulado').innerHTML = `Total: S/. ${totalGeneral.toFixed(2)}`;
        }

        function limpiar() {
            if(confirm("¿Vaciar todas las listas de pulido?")) {
                datosPulido = { "Triple": [], "8mm": [], "10mm": [] };
                actualizarInterfaz();
            }
        }
    </script>
</body>
</html>
