<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Puertas - VIDRIERÍA UNIVERSAL</title>
    
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    
    <style>
        body {
            background-color: #000;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.8) 50%, #000 100%), 
                        url("assets/img/bg-masthead.jpg");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            font-family: 'Varela Round', sans-serif;
        }

        header.masthead {
            background: transparent !important;
            height: 25vh !important;
            min-height: 200px !important;
            padding-top: 80px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header.masthead h1 {
            font-size: 4rem !important;
            letter-spacing: 0.5rem;
            margin-top: 20px !important;
            position: relative;
            z-index: 50;
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.2));
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .card-custom { 
            background: rgba(0, 0, 0, 0.85) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white !important;
        }

        .section-subida {
            margin-top: -0px !important;
            position: relative;
            z-index: 10;
            padding-bottom: 5rem;
        }

        .btn-primary { background-color: #64a19d; border-color: #64a19d; }
        .btn-outline-primary { color: #64a19d; border-color: #64a19d; }
        .btn-check:checked + .btn-outline-primary { background-color: #64a19d !important; color: white !important; }
        .form-control { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; }
        
        .group-label { font-size: 0.75rem; color: #64a19d; text-transform: uppercase; margin-bottom: 5px; display: block; margin-top: 10px; }
        
        .resumen-titulo { 
            font-size: 0.8rem; 
            color: #64a19d; 
            border-bottom: 1px solid #333; 
            padding-bottom: 3px; 
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body id="page-top">

    <div id="contenedor-menu"></div>

    <header class="masthead">
        <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
            <div class="text-center">
                <h1 class="mx-auto my-0 text-uppercase">Puertas</h1>
            </div>
        </div>
    </header>

    <section class="container px-4 px-lg-5 section-subida">
        <div class="row gx-5">
            <div class="col-md-6 mb-4">
                <div class="card card-custom p-4 shadow">
                    <h4 class="text-white text-center mb-4">Configuración de Vidrio</h4>
                    
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label text-white-50 small">Altura (cm):</label>
                            <input type="number" class="form-control form-control-lg" id="altura" placeholder="0">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label text-white-50 small">Ancho (cm):</label>
                            <input type="number" class="form-control form-control-lg" id="ancho" placeholder="0">
                        </div>
                    </div>

                    <div class="mb-4">
                        <h6 class="text-white-50 small mb-3">Seleccionar Producto:</h6>
                        
                        <span class="group-label">Puerta Simple</span>
                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <input type="radio" class="btn-check" name="tipoProducto" id="p1" data-nombre="Puerta Simple" checked>
                            <label class="btn btn-outline-primary btn-sm" for="p1" id="lbl-p1">P. Simple</label>
                            
                            <input type="radio" class="btn-check" name="tipoProducto" id="p2" data-nombre="Puerta Pequeña">
                            <label class="btn btn-outline-primary btn-sm" for="p2" id="lbl-p2">P. Pequeña</label>
                        </div>

                        <span class="group-label">Con Paflón</span>
                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <input type="radio" class="btn-check" name="tipoProducto" id="p3" data-nombre="P. y Mampara Paflón">
                            <label class="btn btn-outline-primary btn-sm" for="p3" id="lbl-p3">P. y Mampara Paflón</label>
                        </div>

                        <span class="group-label">Mamparas</span>
                        <div class="d-flex flex-wrap gap-2">
                            <input type="radio" class="btn-check" name="tipoProducto" id="p4" data-nombre="Mampara Triple Estructura">
                            <label class="btn btn-outline-primary btn-sm" for="p4" id="lbl-p4">Triple Estructura</label>
                            
                            <input type="radio" class="btn-check" name="tipoProducto" id="p5" data-nombre="Mampara Sistema 8mm">
                            <label class="btn btn-outline-primary btn-sm" for="p5" id="lbl-p5">Sistema Vidrio 8mm</label>
                        </div>
                    </div>

                    <div class="text-center mb-4">
                        <h5 class="text-white bg-black p-3 rounded border border-secondary" id="resultado">Costo: S/. 0.00</h5>
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg text-uppercase fw-bold" onclick="guardarPedido()">Añadir a Pedido</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card card-custom p-4 shadow h-100">
                    <h4 class="text-white text-center mb-4">Resumen de Materiales</h4>
                    <div style="max-height: 450px; overflow-y: auto;" class="px-2">
                        
                        <div class="resumen-titulo">Puertas Simples:</div>
                        <ul id="listaSimples" class="list-unstyled mb-3 text-white-50 small"></ul>
                        
                        <div class="resumen-titulo">Con Paflón:</div>
                        <ul id="listaPaflon" class="list-unstyled mb-3 text-white-50 small"></ul>
                        
                        <div class="resumen-titulo">Mamparas:</div>
                        <ul id="listaMamparas" class="list-unstyled mb-3 text-white-50 small"></ul>

                    </div>
                    <div class="mt-auto pt-3 border-top border-secondary text-center">
                        <h4 id="totalGuardado" class="text-white">Total: S/. 0.00</h4>
                        <button class="btn btn-sm btn-link text-danger mt-2 text-decoration-none" onclick="limpiarTodo()">BORRAR TODO</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="contenedor-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu-dinamico.js"></script>
    <script src="footer-dinamico.js"></script>

    <script>
        const preciosPuertas = {
            p1: parseFloat(localStorage.getItem('precio_p1')) || 20,
            p2: parseFloat(localStorage.getItem('precio_p2')) || 18,
            p3: parseFloat(localStorage.getItem('precio_p3')) || 28,
            p4: parseFloat(localStorage.getItem('precio_p4')) || 20,
            p5: parseFloat(localStorage.getItem('precio_p5')) || 20
        };

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('lbl-p1').innerText = `P. Simple (S/. ${preciosPuertas.p1})`;
            document.getElementById('lbl-p2').innerText = `P. Pequeña (S/. ${preciosPuertas.p2})`;
            document.getElementById('lbl-p3').innerText = `P. y Mampara Paflón (S/. ${preciosPuertas.p3})`;
            document.getElementById('lbl-p4').innerText = `Triple Estructura (S/. ${preciosPuertas.p4})`;
            document.getElementById('lbl-p5').innerText = `Sistema Vidrio 8mm (S/. ${preciosPuertas.p5})`;
        });

        let pedidos = [];

        function calcularPrecio() {
            const h = parseFloat(document.getElementById('altura').value);
            const a = parseFloat(document.getElementById('ancho').value);
            const seleccionado = document.querySelector('input[name="tipoProducto"]:checked');
            
            if (!h || !a || h <= 0 || a <= 0 || !seleccionado) return null;

            const precioBase = preciosPuertas[seleccionado.id];
            const costo = ((h * a) / 900) * precioBase;
            
            return {
                h, a, costo,
                nombre: seleccionado.getAttribute('data-nombre')
            };
        }

        document.addEventListener('input', () => {
            const p = calcularPrecio();
            document.getElementById('resultado').innerHTML = p ? `Costo: S/. ${p.costo.toFixed(2)}` : "Costo: S/. 0.00";
        });

        function guardarPedido() {
            const p = calcularPrecio();
            if (p) {
                pedidos.push(p);
                actualizarInterfaz();
                // No borramos las medidas para que puedas seguir usándolas
                document.getElementById('altura').focus();
            }
        }

        function actualizarInterfaz() {
            const listas = {
                "Puerta Simple": document.getElementById('listaSimples'),
                "Puerta Pequeña": document.getElementById('listaSimples'),
                "P. y Mampara Paflón": document.getElementById('listaPaflon'),
                "Mampara Triple Estructura": document.getElementById('listaMamparas'),
                "Mampara Sistema 8mm": document.getElementById('listaMamparas')
            };

            Object.values(listas).forEach(ul => { if(ul) ul.innerHTML = ''; });

            pedidos.forEach((item) => {
                const ul = listas[item.nombre];
                if (ul) {
                    const li = document.createElement('li');
                    li.className = "d-flex justify-content-between border-bottom border-dark py-1";
                    li.innerHTML = `<span>${item.nombre} (${item.a}x${item.h})</span> <span>S/. ${item.costo.toFixed(2)}</span>`;
                    ul.appendChild(li);
                }
            });

            const total = pedidos.reduce((acc, curr) => acc + curr.costo, 0);
            document.getElementById('totalGuardado').innerHTML = `Total: S/. ${total.toFixed(2)}`;
        }

        function limpiarTodo() {
            if(confirm("¿Vaciar la lista de pedidos?")) {
                pedidos = [];
                actualizarInterfaz();
            }
        }
    </script>
</body>
</html>
