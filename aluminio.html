<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Aluminio - VIDRIERÍA UNIVERSAL</title>
    
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    
    <style>
            body {
	    display: flex;
	    flex-direction: column;
	    min-height: 211vh;
		}
		#contenedor-footer {
		    margin-top: auto;
		}

        body {
            background-color: #000;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.8) 50%, #000 100%), 
                        url("assets/img/bg-masthead.jpg");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            font-family: 'Varela Round', sans-serif;
        }

        header.masthead {
            background: transparent !important;
            height: 25vh !important;
            min-height: 200px !important;
            padding-top: 80px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header.masthead h1 {
            font-size: 4rem !important;
            letter-spacing: 0.5rem;
            margin-top: 20px !important;
            position: relative;
            z-index: 50;
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.2));
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .card-custom { 
            background: rgba(0, 0, 0, 0.85) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white !important;
        }

        .section-subida {
            position: relative;
            z-index: 10;
            padding-bottom: 5rem;
        }

        .btn-primary { background-color: #64a19d; border-color: #64a19d; }
        .btn-primary:disabled { background-color: #333 !important; border-color: #444 !important; color: #666 !important; }
        .btn-outline-primary { color: #64a19d; border-color: #64a19d; font-size: 0.85rem; }
        .btn-check:checked + .btn-outline-primary { background-color: #64a19d !important; color: white !important; }
        .form-control { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; }

        .resumen-titulo {
            color: #64a19d;
            border-bottom: 1px solid #333;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* ESTILO DE ALERTA UNIFICADO (Vidrio Pulido) */
        #mensaje-error-config {
            border: 1px dashed #64a19d;
            background: rgba(100, 161, 157, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #64a19d; border-radius: 10px; }
    </style>
</head>
<body id="page-top">

    <div id="contenedor-menu"></div>

    <header class="masthead">
        <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
            <div class="text-center">
                <h1 class="mx-auto my-0 text-uppercase">Aluminio</h1>
            </div>
        </div>
    </header>

    <section class="container px-4 px-lg-5 section-subida">
        <div class="row gx-5">
            <div class="col-md-6 mb-4">
                <div class="card card-custom p-4 shadow">
                    <h4 class="text-white text-center mb-4">Seleccionar Material</h4>
                    
                    <div id="contenido-calc">
                        <div class="d-flex justify-content-center flex-wrap gap-2 mb-4" id="botonesAluminio"></div>

                        <div class="mb-3">
                            <label class="form-label text-white-50 small">Longitud (cm):</label>
                            <input type="number" class="form-control form-control-lg" id="longitud" placeholder="0">
                        </div>

                        <div id="mensaje-error-config" class="p-3 text-center d-none mb-4">
                            <p class="text-white small mb-2">Faltan precios de aluminio en la configuración.</p>
                            <button class="btn btn-primary w-100 fw-bold" onclick="window.location.href='config.html'">Configurar</button>
                        </div>

                        <div class="text-center mb-4">
                            <h5 class="text-white bg-black p-3 rounded border border-secondary" id="resultado">Costo: S/. 0.00</h5>
                        </div>

                        <div class="d-grid">
                            <button id="btn-anadir" class="btn btn-primary btn-lg text-uppercase fw-bold" onclick="guardarPrecio()">Añadir a Lista</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card card-custom p-4 shadow h-100">
                    <h4 class="text-white text-center mb-4">Resumen de Materiales</h4>
                    
                    <div style="max-height: 450px; overflow-y: auto;" class="px-2">
                        <div class="resumen-titulo">Perfil H</div>
                        <ul id="listaH" class="list-unstyled text-white-50 small mb-2"></ul>

                        <div class="resumen-titulo">Felfa</div>
                        <ul id="listaFelfa" class="list-unstyled text-white-50 small mb-2"></ul>

                        <div class="resumen-titulo">Porta Felfa</div>
                        <ul id="listaPortaFelfa" class="list-unstyled text-white-50 small mb-2"></ul>
                    </div>
                    
                    <div class="mt-auto pt-3 border-top border-secondary text-center">
                        <h4 id="totalGuardado" class="text-white">Total: S/. 0.00</h4>
                        <button class="btn btn-sm btn-link text-danger mt-2 text-decoration-none" onclick="limpiarTodo()">BORRAR TODO</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <div id="contenedor-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu-dinamico.js"></script>
    <script src="footer-dinamico.js"></script>
    
    <script>
        let datos = { h: [], felfa: [], portaFelfa: [] };

        function verificarPreciosYBotones() {
            const pH = localStorage.getItem('precio_al1') || "0";
            const pF = localStorage.getItem('precio_al2') || "0";
            const pP = localStorage.getItem('precio_al3') || "0";

            document.getElementById('botonesAluminio').innerHTML = `
                <div style="flex:1">
                    <input type="radio" class="btn-check" name="tipoMaterial" id="optH" value="${pH}" data-category="h" onchange="seleccionarTipo()">
                    <label class="btn btn-outline-primary w-100 h-100 py-2" for="optH">Perfil H<br>S/ ${parseFloat(pH).toFixed(2)}</label>
                </div>
                <div style="flex:1">
                    <input type="radio" class="btn-check" name="tipoMaterial" id="optFelfa" value="${pF}" data-category="felfa" onchange="seleccionarTipo()">
                    <label class="btn btn-outline-primary w-100 h-100 py-2" for="optFelfa">Felfa<br>S/ ${parseFloat(pF).toFixed(2)}</label>
                </div>
                <div style="flex:1">
                    <input type="radio" class="btn-check" name="tipoMaterial" id="optPorta" value="${pP}" data-category="portaFelfa" onchange="seleccionarTipo()">
                    <label class="btn btn-outline-primary w-100 h-100 py-2" for="optPorta">Porta Felfa<br>S/ ${parseFloat(pP).toFixed(2)}</label>
                </div>
            `;

            // Selección por defecto: Perfil H
            document.getElementById('optH').checked = true;
            seleccionarTipo();
        }

        function seleccionarTipo() {
            const seleccionado = document.querySelector('input[name="tipoMaterial"]:checked');
            const precio = parseFloat(seleccionado.value);
            const mensajeError = document.getElementById('mensaje-error-config');
            const btnAnadir = document.getElementById('btn-anadir');

            if (precio > 0) {
                mensajeError.classList.add('d-none');
                btnAnadir.disabled = false;
                actualizarCosto();
            } else {
                mensajeError.classList.remove('d-none');
                btnAnadir.disabled = true;
                document.getElementById('resultado').innerHTML = "Costo: S/. 0.00";
            }
        }

        function calcularPrecio() {
            const longitud = parseFloat(document.getElementById('longitud').value);
            const seleccionado = document.querySelector('input[name="tipoMaterial"]:checked');
            const precioBase = parseFloat(seleccionado.value);
            if (!longitud || longitud <= 0 || !precioBase) return null;
            
            return { 
                longitud, 
                total: (longitud / 100) * precioBase, 
                categoria: seleccionado.getAttribute('data-category') 
            };
        }

        function actualizarCosto() {
            const m = calcularPrecio();
            document.getElementById('resultado').innerHTML = m ? `Costo: S/. ${m.total.toFixed(2)}` : "Costo: S/. 0.00";
        }

        function guardarPrecio() {
            const material = calcularPrecio(); 
            if (material) {
                datos[material.categoria].push(material);
                actualizarInterfaz();
                document.getElementById('longitud').focus(); // Mantener foco según protocolo
            }
        }

        function actualizarInterfaz() {
            ['h', 'felfa', 'portaFelfa'].forEach(cat => {
                const listaUI = document.getElementById(`lista${cat.charAt(0).toUpperCase() + cat.slice(1)}`);
                listaUI.innerHTML = '';
                datos[cat].forEach((m, i) => {
                    const li = document.createElement('li');
                    li.className = "d-flex justify-content-between border-bottom border-dark py-1";
                    li.innerHTML = `<span>${i+1}. ${m.longitud}cm</span> <span>S/. ${m.total.toFixed(2)}</span>`;
                    listaUI.appendChild(li);
                });
            });
            const granTotal = [...datos.h, ...datos.felfa, ...datos.portaFelfa].reduce((sum, m) => sum + m.total, 0);
            document.getElementById('totalGuardado').innerHTML = `Total: S/. ${granTotal.toFixed(2)}`;
        }

        function limpiarTodo() {
            if(confirm("¿Deseas vaciar la lista?")) {
                datos = { h: [], felfa: [], portaFelfa: [] };
                actualizarInterfaz();
            }
        }

        document.getElementById('longitud').addEventListener('input', actualizarCosto);
        window.onload = verificarPreciosYBotones;
    </script>
</body>
</html>
