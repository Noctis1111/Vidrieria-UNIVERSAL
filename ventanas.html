<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Ventanas - VIDRIERÍA UNIVERSAL</title>
    
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    
    <style>
        body {
            background-color: #000;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.8) 50%, #000 100%), 
                        url("assets/img/bg-masthead.jpg");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            font-family: 'Varela Round', sans-serif;
        }

        header.masthead {
            background: transparent !important;
            height: 25vh !important;
            min-height: 200px !important;
            padding-top: 80px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header.masthead h1 {
            font-size: 4rem !important;
            letter-spacing: 0.5rem;
            margin-top: 20px !important; 		/* <--- CAMBIA ESTO PARA SUBIR O BAJAR EL TÍTULO */
            position: relative;
            z-index: 50;
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.2));
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .card-custom { 
            background: rgba(0, 0, 0, 0.85) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white !important;
        }

        .section-subida {
            margin-top: -0px !important; 		/* <--- CAMBIA ESTO PARA ACERCAR O ALEJAR EL CUADRO DEL TÍTULO */
            position: relative;
            z-index: 10;
            padding-bottom: 5rem;
        }

        .btn-primary { background-color: #64a19d; border-color: #64a19d; }
        .btn-outline-primary { color: #64a19d; border-color: #64a19d; }
        .btn-check:checked + .btn-outline-primary { background-color: #64a19d !important; color: white !important; }
        .form-control { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; }
        .group-label { font-size: 0.75rem; color: #64a19d; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        .resumen-seccion { margin-bottom: 1.5rem; }
        .resumen-titulo { 
            font-size: 0.8rem; 
            color: #64a19d; 
            border-bottom: 1px solid #333; 
            padding-bottom: 3px; 
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body id="page-top">

    <div id="contenedor-menu"></div>

    <header class="masthead">
        <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
            <div class="text-center">
                <h1 class="mx-auto my-0 text-uppercase">Ventanas</h1>
            </div>
        </div>
    </header>

    <section class="container px-4 px-lg-5 section-subida">
        <div class="row gx-5">
            <div class="col-md-6 mb-4">
                <div class="card card-custom p-4 shadow">
                    <h4 class="text-white text-center mb-4">Configurar Ventana</h4>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label text-white-50 small">Altura (cm):</label>
                            <input type="number" class="form-control form-control-lg" id="altura" placeholder="0">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label text-white-50 small">Ancho (cm):</label>
                            <input type="number" class="form-control form-control-lg" id="ancho" placeholder="0">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-white-50 small d-block mb-3">Seleccione Sistema / Modelo:</label>
                        
                        <div class="mb-3">
                            <span class="group-label">Sistema</span>
                            <div class="d-flex flex-wrap gap-2">
                                <input type="radio" class="btn-check" name="tipoVentana" id="v1" data-cat="Sistema" data-nombre="Sistema Triple" checked>
                                <label class="btn btn-outline-primary btn-sm" for="v1" id="lbl-v1">Triple (S/. 10)</label>
                                
                                <input type="radio" class="btn-check" name="tipoVentana" id="v2" data-cat="Sistema" data-nombre="Sistema Doble">
                                <label class="btn btn-outline-primary btn-sm" for="v2" id="lbl-v2">Doble (S/. 9)</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <span class="group-label">Con Marco</span>
                            <div class="d-flex flex-wrap gap-2">
                                <input type="radio" class="btn-check" name="tipoVentana" id="v3" data-cat="Marco" data-nombre="Marco Triple">
                                <label class="btn btn-outline-primary btn-sm" for="v3" id="lbl-v3">Triple (S/. 20)</label>
                                
                                <input type="radio" class="btn-check" name="tipoVentana" id="v4" data-cat="Marco" data-nombre="Marco Doble">
                                <label class="btn btn-outline-primary btn-sm" for="v4" id="lbl-v4">Doble (S/. 18)</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <span class="group-label">Estructura</span>
                            <div class="d-flex flex-wrap gap-2">
                                <input type="radio" class="btn-check" name="tipoVentana" id="v5" data-cat="Estructura" data-nombre="Estructura">
                                <label class="btn btn-outline-primary btn-sm" for="v5" id="lbl-v5">Estructura (S/. 25)</label>
                            </div>
                        </div>
                    </div>

                    <div class="text-center mb-4">
                        <h5 class="text-white bg-black p-3 rounded border border-secondary" id="resultado">Costo: S/. 0.00</h5>
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg text-uppercase fw-bold" onclick="guardar()">Añadir a Lista</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card card-custom p-4 shadow h-100">
                    <h4 class="text-white text-center mb-4">Resumen</h4>
                    <div style="max-height: 500px; overflow-y: auto;" class="px-2">
                        
                        <div class="resumen-seccion">
                            <h6 class="text-white fw-bold border-bottom border-secondary mb-2">SISTEMAS</h6>
                            <div class="ps-2">
                                <div class="resumen-titulo">Triples:</div>
                                <ul id="listaSistemaTriple" class="list-unstyled mb-2 text-white-50 small"></ul>
                                
                                <div class="resumen-titulo">Dobles:</div>
                                <ul id="listaSistemaDoble" class="list-unstyled mb-3 text-white-50 small"></ul>
                            </div>
                        </div>

                        <div class="resumen-seccion">
                            <h6 class="text-white fw-bold border-bottom border-secondary mb-2">CON MARCO</h6>
                            <div class="ps-2">
                                <div class="resumen-titulo">Triples:</div>
                                <ul id="listaMarcoTriple" class="list-unstyled mb-2 text-white-50 small"></ul>
                                
                                <div class="resumen-titulo">Dobles:</div>
                                <ul id="listaMarcoDoble" class="list-unstyled mb-3 text-white-50 small"></ul>
                            </div>
                        </div>

                        <div class="resumen-seccion">
                            <h6 class="text-white fw-bold border-bottom border-secondary mb-2">ESTRUCTURAS</h6>
                            <ul id="listaEstructura" class="list-unstyled ps-2 text-white-50 small"></ul>
                        </div>

                    </div>
                    <div class="mt-auto pt-3 border-top border-secondary text-center">
                        <h4 id="totalAcumulado" class="text-white">Total: S/. 0.00</h4>
                        <button class="btn btn-sm btn-link text-danger mt-2 text-decoration-none" onclick="limpiar()">BORRAR TODO</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="contenedor-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu-dinamico.js"></script>
    <script src="footer-dinamico.js"></script>

    <script>
        // CARGA DE PRECIOS DESDE LA MEMORIA LOCAL O USA PRECIOS BASE
        const preciosVentanas = {
            v1: parseFloat(localStorage.getItem('precio_v1')) || 10,
            v2: parseFloat(localStorage.getItem('precio_v2')) || 9,
            v3: parseFloat(localStorage.getItem('precio_v3')) || 20,
            v4: parseFloat(localStorage.getItem('precio_v4')) || 18,
            v5: parseFloat(localStorage.getItem('precio_v5')) || 25
        };

        // ACTUALIZA EL TEXTO DE LOS BOTONES PARA MOSTRAR EL PRECIO REAL
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('lbl-v1').innerText = `Triple (S/. ${preciosVentanas.v1})`;
            document.getElementById('lbl-v2').innerText = `Doble (S/. ${preciosVentanas.v2})`;
            document.getElementById('lbl-v3').innerText = `Triple (S/. ${preciosVentanas.v3})`;
            document.getElementById('lbl-v4').innerText = `Doble (S/. ${preciosVentanas.v4})`;
            document.getElementById('lbl-v5').innerText = `Estructura (S/. ${preciosVentanas.v5})`;
        });

        let datos = [];

        function calcular() {
            const h = parseFloat(document.getElementById('altura').value);
            const a = parseFloat(document.getElementById('ancho').value);
            const seleccionado = document.querySelector('input[name="tipoVentana"]:checked');
            if (!h || !a || h <= 0 || a <= 0 || !seleccionado) return null;
            
            // Jala el precio correcto según el ID del botón seleccionado
            const precioActual = preciosVentanas[seleccionado.id];
            const costo = ((h * a) / 900) * precioActual;
            
            return { 
                h, a, costo, 
                categoria: seleccionado.getAttribute('data-cat'), 
                nombre: seleccionado.getAttribute('data-nombre') 
            };
        }

        document.addEventListener('input', () => {
            const m = calcular();
            document.getElementById('resultado').innerHTML = m ? `Costo: S/. ${m.costo.toFixed(2)}` : "Costo: S/. 0.00";
        });

        function guardar() {
            const m = calcular();
            if (m) {
                datos.push(m);
                actualizarInterfaz();
                document.getElementById('altura').focus();
            }
        }

        function actualizarInterfaz() {
            const listas = {
                "Sistema Triple": document.getElementById('listaSistemaTriple'),
                "Sistema Doble": document.getElementById('listaSistemaDoble'),
                "Marco Triple": document.getElementById('listaMarcoTriple'),
                "Marco Doble": document.getElementById('listaMarcoDoble'),
                "Estructura": document.getElementById('listaEstructura')
            };

            Object.values(listas).forEach(ul => { if(ul) ul.innerHTML = ''; });

            datos.forEach((item) => {
                const ul = listas[item.nombre];
                if (ul) {
                    const li = document.createElement('li');
                    li.className = "d-flex justify-content-between border-bottom border-dark py-1";
                    li.innerHTML = `<span>(${item.a}x${item.h})</span> <span>S/. ${item.costo.toFixed(2)}</span>`;
                    ul.appendChild(li);
                }
            });

            const total = datos.reduce((acc, curr) => acc + curr.costo, 0);
            document.getElementById('totalAcumulado').innerHTML = `Total: S/. ${total.toFixed(2)}`;
        }

        function limpiar() {
            if(confirm("¿Vaciar la lista de resumen?")) {
                datos = [];
                actualizarInterfaz();
            }
        }
    </script>
</body>
</html>
