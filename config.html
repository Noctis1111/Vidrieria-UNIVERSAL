<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Configuración de Precios - VIDRIERÍA UNIVERSAL</title>
    
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <style>
            body {
	    display: flex;
	    flex-direction: column;
	    min-height: 211vh;
		}
		#contenedor-footer {
		    margin-top: auto;
		}

        body {
            background-color: #000;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.8) 50%, #000 100%), 
                        url("assets/img/bg-masthead.jpg");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            font-family: 'Varela Round', sans-serif;
            color: white;
            min-height: 100vh;
        }

        #mainNav {
            background: linear-gradient(to bottom, #000 0%, rgba(0,0,0,0.8) 60%, rgba(0,0,0,0) 100%) !important;
            border: none !important;
        }

        #mainNav .nav-link, #mainNav .navbar-brand, #mainNav a {
            color: #ffffff !important;
        }
        #mainNav .nav-link:hover, #mainNav a:hover {
            color: #64a19d !important;
        }

        header.masthead-config {
            padding-top: 130px;
            padding-bottom: 20px;
            text-align: center;
        }

        header.masthead-config h1 {
            font-size: 3rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.2));
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            font-weight: bold;
        }

        .card-custom { 
            background: rgba(0, 0, 0, 0.85) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            border-radius: 15px;
        }

        .nav-tabs { border-bottom: 1px solid #333; background: rgba(0,0,0,0.3); }
        .nav-tabs .nav-link { color: #888; border: none; padding: 15px; font-weight: bold; }
        .nav-tabs .nav-link.active { background: transparent; color: #64a19d; border-bottom: 3px solid #64a19d; }

        .form-control { background-color: #111 !important; border: 1px solid #444 !important; color: white !important; }
        .form-control:focus { border-color: #64a19d !important; box-shadow: 0 0 10px rgba(100, 161, 157, 0.3); }

        .btn-success { background-color: #64a19d; border-color: #64a19d; font-weight: bold; padding: 15px; text-transform: uppercase; }
        
        .label-grupo {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(100, 161, 157, 0.4);
            letter-spacing: 1px;
        }
    </style>
</head>
<body id="page-top">

    <div id="contenedor-menu"></div>

    <header class="masthead-config">
        <div class="container">
            <h1>Configuración</h1>
            <p class="text-white-50">Administración de Precios Base</p>
        </div>
    </header>

    <div class="container pb-5">
        <div class="card card-custom overflow-hidden">
            <ul class="nav nav-tabs" id="configTabs" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-ventanas">Ventanas</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-puertas">Puertas</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-vidrio">Vidrio</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-vidriopulido">Vidrio Pulido</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-vitrinas">Vitrinas</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-aluminio">Aluminio</button></li>
            </ul>

            <div class="tab-content p-4">
                
                <div class="tab-pane fade show active" id="tab-ventanas">
                    <div class="row">
                        <div class="col-md-4 border-end border-secondary">
                            <div class="label-grupo text-info">1. Sistema</div>
                            <div class="mb-3"><label class="small text-white-50">Sist. Triple (v1)</label><input type="number" step="0.1" id="v1" class="form-control"></div>
                            <div class="mb-3"><label class="small text-white-50">Sist. Doble (v2)</label><input type="number" step="0.1" id="v2" class="form-control"></div>
                        </div>
                        <div class="col-md-4 border-end border-secondary ps-md-4">
                            <div class="label-grupo text-warning">2. Con Marco</div>
                            <div class="mb-3"><label class="small text-white-50">Marco Triple (v3)</label><input type="number" step="0.1" id="v3" class="form-control"></div>
                            <div class="mb-3"><label class="small text-white-50">Marco Doble (v4)</label><input type="number" step="0.1" id="v4" class="form-control"></div>
                        </div>
                        <div class="col-md-4 ps-md-4">
                            <div class="label-grupo text-success">3. Estructura</div>
                            <div class="mb-3"><label class="small text-white-50">Estructura (v5)</label><input type="number" step="0.1" id="v5" class="form-control"></div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="tab-puertas">
                    <div class="row">
                        <div class="col-md-4 border-end border-secondary">
                            <div class="label-grupo text-info">1. Puertas</div>
                            <div class="mb-3"><label class="small text-white-50">Puerta Grande ≥66 (p1)</label><input type="number" step="0.1" id="p1" class="form-control"></div>
                            <div class="mb-3"><label class="small text-white-50">Puerta Pequeña ≤65 (p2)</label><input type="number" step="0.1" id="p2" class="form-control"></div>
                        </div>
                        <div class="col-md-4 border-end border-secondary ps-md-4">
                            <div class="label-grupo text-warning">2. Con Paflón</div>
                            <div class="mb-3"><label class="small text-white-50">P. M. con paflon (p3)</label><input type="number" step="0.1" id="p3" class="form-control"></div>
                            
                            <div class="label-grupo text-primary mt-4">4. Duchas</div>
                            <div class="mb-3"><label class="small text-white-50">Puerta Ducha (p6)</label><input type="number" step="0.1" id="p6" class="form-control"></div>
                        </div>
                        <div class="col-md-4 ps-md-4">
                            <div class="label-grupo text-success">3. Mamparas</div>
                            <div class="mb-3"><label class="small text-white-50">Triple-Estructura (p4)</label><input type="number" step="0.1" id="p4" class="form-control"></div>
                            <div class="mb-3"><label class="small text-white-50">8mm-Sistema (p5)</label><input type="number" step="0.1" id="p5" class="form-control"></div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="tab-vidrio">
                    <div class="row">
                        <div class="col-md-6 border-end border-secondary">
                            <div class="label-grupo text-warning">Reparación</div>
                            <div class="row">
                                <div class="col-6 mb-2"><label class="small text-white-50">Triple</label><input type="number" id="vr1" class="form-control"></div>
                                <div class="col-6 mb-2"><label class="small text-white-50">Doble</label><input type="number" id="vr2" class="form-control"></div>
                                <div class="col-6 mb-2"><label class="small text-white-50">Catedral</label><input type="number" id="vr3" class="form-control"></div>
                                <div class="col-6 mb-2"><label class="small text-white-50">Espejo</label><input type="number" id="vr4" class="form-control"></div>
                            </div>
                        </div>
                        <div class="col-md-6 ps-md-4">
                            <div class="label-grupo text-info">Solo Vidrio (Venta)</div>
                            <div class="row">
                                <div class="col-6 mb-2"><label class="small text-white-50">Triple</label><input type="number" id="vs1" class="form-control"></div>
                                <div class="col-6 mb-2"><label class="small text-white-50">Doble</label><input type="number" id="vs2" class="form-control"></div>
                                <div class="col-6 mb-2"><label class="small text-white-50">Catedral</label><input type="number" id="vs3" class="form-control"></div>
                                <div class="col-6 mb-2"><label class="small text-white-50">Espejo</label><input type="number" id="vs4" class="form-control"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="tab-vidriopulido">
                    <div class="row">
                        <div class="col-md-6 border-end border-secondary">
                            <div class="label-grupo text-info">Tipos de Pulido</div>
                            <div class="mb-3"><label class="small text-white-50">Triple (vp1)</label><input type="number" step="0.1" id="vp1" class="form-control"></div>
                            <div class="mb-3"><label class="small text-white-50">8mm (vp2)</label><input type="number" step="0.1" id="vp2" class="form-control"></div>
                            <div class="mb-3"><label class="small text-white-50">10mm (vp3)</label><input type="number" step="0.1" id="vp3" class="form-control"></div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="tab-vitrinas">
                    <div class="row">
                        <div class="col-md-6 border-end border-secondary">
                            <div class="label-grupo text-info">1. Aluminio</div>
                            <div class="mb-3"><label class="small text-white-50">Aluminio ≤100 (v_alum35)</label><input type="number" step="0.1" id="v_alum35" class="form-control"></div>
                            <div class="mb-3"><label class="small text-white-50">Aluminio ≥101 (v_alum29)</label><input type="number" step="0.1" id="v_alum29" class="form-control"></div>
                        </div>
                        <div class="col-md-6 ps-md-4">
                            <div class="label-grupo text-success">2. Vidrio</div>
                            <div class="mb-3"><label class="small text-white-50">Vidrio ≤100 (v_vid30)</label><input type="number" step="0.1" id="v_vid30" class="form-control"></div>
                            <div class="mb-3"><label class="small text-white-50">Vidrio ≥101 (v_vid25)</label><input type="number" step="0.1" id="v_vid25" class="form-control"></div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="tab-aluminio">
                    <div class="row">
                        <div class="col-md-6 border-end border-secondary">
                            <div class="label-grupo text-info">Perfiles</div>
                            <div class="mb-3"><label class="small text-white-50">Perfil H (al1)</label><input type="number" step="0.1" id="al1" class="form-control"></div>
                        </div>
                        <div class="col-md-6 ps-md-4">
                            <div class="label-grupo text-success">Accesorios</div>
                            <div class="mb-3"><label class="small text-white-50">Felfa (al2)</label><input type="number" step="0.1" id="al2" class="form-control"></div>
                            <div class="mb-3"><label class="small text-white-50">Porta Felfa (al3)</label><input type="number" step="0.1" id="al3" class="form-control"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-4 border-top border-secondary">
                <button class="btn btn-success w-100" onclick="guardarPrecios()">GUARDAR TODOS LOS PRECIOS</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu-dinamico.js"></script>

    <script>
        // Array actualizado con el ID p6 (Puerta Ducha)
        const todosLosIds = [
            'v1', 'v2', 'v3', 'v4', 'v5',
            'p1', 'p2', 'p3', 'p4', 'p5', 'p6',
            'vr1', 'vr2', 'vr3', 'vr4', 'vs1', 'vs2', 'vs3', 'vs4',
            'vp1', 'vp2', 'vp3',
            'v_alum35', 'v_alum29', 'v_vid30', 'v_vid25', 'al1', 'al2', 'al3'
        ];

        window.onload = function() {
            todosLosIds.forEach(id => {
                const valor = localStorage.getItem(`precio_${id}`);
                const input = document.getElementById(id);
                if(valor && input) input.value = valor;
            });
        }

        function guardarPrecios() {
            todosLosIds.forEach(id => {
                const input = document.getElementById(id);
                if(input && input.value !== "") {
                    localStorage.setItem(`precio_${id}`, input.value);
                }
            });
            alert("¡Precios guardados correctamente!");
        }
    </script>
</body>
</html>
