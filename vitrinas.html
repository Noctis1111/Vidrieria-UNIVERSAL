<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Vitrinas - VIDRIERÍA UNIVERSAL</title>
    
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    
    <style>
        body {
	    display: flex;
	    flex-direction: column;
	    min-height: 211vh;
		}
		#contenedor-footer {
		    margin-top: auto;
		}

        body {
            background-color: #000;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.8) 50%, #000 100%), 
                        url("assets/img/bg-masthead.jpg");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            font-family: 'Varela Round', sans-serif;
        }

        header.masthead {
            background: transparent !important;
            height: 25vh !important;
            min-height: 200px !important;
            padding-top: 80px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header.masthead h1 {
            font-size: 4rem !important;
            letter-spacing: 0.5rem;
            margin-top: 20px !important;
            position: relative;
            z-index: 50;
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.2));
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .card-custom { 
            background: rgba(0, 0, 0, 0.85) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white !important;
        }

        .section-subida {
            margin-top: -0px !important;
            position: relative;
            z-index: 10;
            padding-bottom: 5rem;
        }

        .btn-primary { background-color: #64a19d; border-color: #64a19d; }
        .btn-primary:disabled { background-color: #3e5a58; border-color: #3e5a58; opacity: 0.5; }
        .btn-outline-primary { color: #64a19d; border-color: #64a19d; }
        .btn-check:checked + .btn-outline-primary { background-color: #64a19d !important; color: white !important; }
        .form-control { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; }
        
        #mensaje-error-config {
            border: 1px dashed #64a19d;
            background: rgba(100, 161, 157, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #64a19d; border-radius: 10px; }
    </style>
</head>
<body id="page-top">

    <div id="contenedor-menu"></div>

    <header class="masthead text-center">
        <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
            <h1 class="mx-auto my-0 text-uppercase">Vitrinas</h1>
        </div>
    </header>

    <section class="container px-4 px-lg-5 section-subida">
        <div class="row gx-5">
            <div class="col-md-6 mb-4">
                <div class="card card-custom p-4 shadow">
                    <h4 class="text-white text-center mb-4">Configurar Vitrina</h4>

                    <div id="contenido-calc">
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label text-white-50 small">Altura (cm):</label>
                                <input type="number" class="form-control form-control-lg" id="altura" placeholder="0">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label text-white-50 small">Ancho (cm):</label>
                                <input type="number" class="form-control form-control-lg" id="ancho" placeholder="0">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-white-50 small d-block mb-2">Seleccione Material:</label>
                            <div class="d-flex justify-content-center flex-wrap gap-2">
                                <input type="radio" class="btn-check" name="tipoVitrina" id="vit_alum" checked onchange="seleccionarCategoria('aluminio')">
                                <label class="btn btn-outline-primary btn-sm px-3" for="vit_alum" id="label_alum">Aluminio</label>

                                <input type="radio" class="btn-check" name="tipoVitrina" id="vit_vid" onchange="seleccionarCategoria('vidrio')">
                                <label class="btn btn-outline-primary btn-sm px-3" for="vit_vid" id="label_vid">Vidrio</label>
                            </div>
                        </div>

                        <div id="mensaje-error-config" class="p-3 text-center d-none mb-4">
                            <p class="text-white small mb-2">Faltan precios en la configuración.</p>
                            <button class="btn btn-primary w-100 fw-bold" onclick="window.location.href='config.html'">Configurar</button>
                        </div>

                        <div class="text-center mb-4">
                            <h5 class="text-white bg-black p-3 rounded border border-secondary" id="resultado">Costo: S/. 0.00</h5>
                        </div>

                        <div class="d-grid">
                            <button id="btn-anadir" class="btn btn-primary btn-lg text-uppercase fw-bold" onclick="guardar()" disabled>Añadir a Pedido</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card card-custom p-4 shadow h-100">
                    <h4 class="text-white text-center mb-4">Resumen de Pedido</h4>
                    <div style="max-height: 400px; overflow-y: auto;" class="px-2">
                        <h6 class="text-primary border-bottom border-secondary pb-1 small text-uppercase" style="color:#64a19d !important;">Aluminio:</h6>
                        <ul id="listaAluminio" class="list-unstyled mb-3 text-white-50 small"></ul>

                        <h6 class="text-primary border-bottom border-secondary pb-1 small text-uppercase" style="color:#64a19d !important;">Vidrio:</h6>
                        <ul id="listaVidrio" class="list-unstyled mb-3 text-white-50 small"></ul>
                    </div>

                    <div class="mt-auto pt-3 border-top border-secondary text-center">
                        <h4 id="totalAcumulado" class="text-white">Total: S/. 0.00</h4>
                        <button class="btn btn-sm btn-link text-danger mt-2 text-decoration-none" onclick="limpiar()">BORRAR TODO</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="contenedor-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu-dinamico.js"></script>
    <script src="footer-dinamico.js"></script>

    <script>
        let vitrinas = { aluminio: [], vidrio: [] };
        let categoriaActual = 'aluminio'; 

        const inputAncho = document.getElementById('ancho');
        const inputAltura = document.getElementById('altura');
        const labelAlum = document.getElementById('label_alum');
        const labelVid = document.getElementById('label_vid');
        const mensajeError = document.getElementById('mensaje-error-config');
        const btnGuardar = document.getElementById('btn-anadir');

        function obtenerPrecios() {
            return {
                alum35: parseFloat(localStorage.getItem('precio_v_alum35')) || 0,
                alum29: parseFloat(localStorage.getItem('precio_v_alum29')) || 0,
                vid30: parseFloat(localStorage.getItem('precio_v_vid30')) || 0,
                vid25: parseFloat(localStorage.getItem('precio_v_vid25')) || 0
            };
        }

        function actualizarLabels() {
            const p = obtenerPrecios();
            const ancho = parseFloat(inputAncho.value) || 0;

            // Lógica de 2 precios antes de colocar las medidas (rango)
            if (ancho <= 0) {
                labelAlum.innerText = `Aluminio (S/. ${p.alum35.toFixed(2)} - ${p.alum29.toFixed(2)})`;
                labelVid.innerText = `Vidrio (S/. ${p.vid30.toFixed(2)} - ${p.vid25.toFixed(2)})`;
            } else if (ancho <= 100) {
                labelAlum.innerText = `Aluminio (S/. ${p.alum35.toFixed(2)})`;
                labelVid.innerText = `Vidrio (S/. ${p.vid30.toFixed(2)})`;
            } else {
                labelAlum.innerText = `Aluminio (S/. ${p.alum29.toFixed(2)})`;
                labelVid.innerText = `Vidrio (S/. ${p.vid25.toFixed(2)})`;
            }
            
            validarConfiguracion();
            recalcular();
        }

        function seleccionarCategoria(cat) {
            categoriaActual = cat;
            validarConfiguracion();
            recalcular();
        }

        function validarConfiguracion() {
            const p = obtenerPrecios();
            const ancho = parseFloat(inputAncho.value) || 0;
            let precioOk = false;

            if (categoriaActual === 'aluminio') {
                precioOk = (ancho <= 100) ? p.alum35 > 0 : p.alum29 > 0;
            } else {
                precioOk = (ancho <= 100) ? p.vid30 > 0 : p.vid25 > 0;
            }

            if (precioOk) {
                mensajeError.classList.add('d-none');
                btnGuardar.disabled = false;
            } else {
                mensajeError.classList.remove('d-none');
                btnGuardar.disabled = true;
            }
        }

        function calcular() {
            const h = parseFloat(inputAltura.value) || 0;
            const a = parseFloat(inputAncho.value) || 0;
            const p = obtenerPrecios();
            
            if (h <= 0 || a <= 0) return null;

            let precioU = 0;
            if (categoriaActual === 'aluminio') {
                precioU = (a <= 100) ? p.alum35 : p.alum29;
            } else {
                precioU = (a <= 100) ? p.vid30 : p.vid25;
            }

            if (precioU <= 0) return null;

            const costoFinal = ((h * a) / 900) * precioU;
            const nombreMostrar = categoriaActual === 'aluminio' ? "Aluminio" : "Vidrio";
            
            return { h, a, costo: costoFinal, nombre: nombreMostrar, catBase: categoriaActual };
        }

        function recalcular() {
            const m = calcular();
            document.getElementById('resultado').innerHTML = m ? `Costo: S/. ${m.costo.toFixed(2)}` : "Costo: S/. 0.00";
        }

        inputAncho.addEventListener('input', actualizarLabels);
        inputAltura.addEventListener('input', recalcular);

        function guardar() {
            const m = calcular();
            if (m) {
                vitrinas[m.catBase].push(m);
                actualizarUI();
                // NO borramos medidas, solo ponemos foco en altura
                inputAltura.focus();
            }
        }

        function actualizarUI() {
            const listas = { aluminio: 'listaAluminio', vidrio: 'listaVidrio' };
            let granTotal = 0;

            for (let cat in vitrinas) {
                const ul = document.getElementById(listas[cat]);
                ul.innerHTML = '';
                vitrinas[cat].forEach((v, i) => {
                    granTotal += v.costo;
                    const li = document.createElement('li');
                    li.className = "d-flex justify-content-between border-bottom border-dark py-2";
                    li.innerHTML = `<span><strong>${i+1}.</strong> ${v.a}x${v.h}</span> <span class="text-white">S/. ${v.costo.toFixed(2)}</span>`;
                    ul.appendChild(li);
                });
            }
            document.getElementById('totalAcumulado').innerText = `Total: S/. ${granTotal.toFixed(2)}`;
        }

        function limpiar() {
            if(confirm("¿Desea vaciar la lista?")) {
                vitrinas = { aluminio: [], vidrio: [] };
                actualizarUI();
            }
        }

        // Inicio
        actualizarLabels();
    </script>
</body>
</html>
