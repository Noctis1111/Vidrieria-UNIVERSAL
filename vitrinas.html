<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Vitrinas - VIDRIERÍA UNIVERSAL</title>
    
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    
	<style>
        body {
            background-color: #000;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.8) 50%, #000 100%), 
                        url("assets/img/bg-masthead.jpg");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            font-family: 'Varela Round', sans-serif;
        }

        header.masthead {
            background: transparent !important;
            height: 25vh !important;
            min-height: 200px !important;
            padding-top: 80px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header.masthead h1 {
            font-size: 4rem !important;
            letter-spacing: 0.5rem;
            margin-top: 20px !important; 		/* <--- CAMBIA ESTO PARA SUBIR O BAJAR EL TÍTULO */
            position: relative;
            z-index: 50;
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.2));
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .card-custom { 
            background: rgba(0, 0, 0, 0.85) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white !important;
        }

        .section-subida {
            margin-top: -0px !important; 		/* <--- CAMBIA ESTO PARA ACERCAR O ALEJAR EL CUADRO DEL TÍTULO */
            position: relative;
            z-index: 10;
            padding-bottom: 5rem;
        }

        .btn-primary { background-color: #64a19d; border-color: #64a19d; }
        .btn-outline-primary { color: #64a19d; border-color: #64a19d; }
        .btn-check:checked + .btn-outline-primary { background-color: #64a19d !important; color: white !important; }
        .form-control { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; }
        .group-label { font-size: 0.75rem; color: #64a19d; text-transform: uppercase; margin-bottom: 5px; display: block; font-weight: bold; }
        
        .resumen-seccion { margin-bottom: 1.5rem; }
        .resumen-titulo { 
            font-size: 0.8rem; 
            color: #64a19d; 
            border-bottom: 1px solid #333; 
            padding-bottom: 3px; 
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
    
</head>
<body id="page-top">

    <div id="contenedor-menu"></div>

    <header class="masthead text-center">
        <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
            <h1 class="mx-auto my-0 text-uppercase">Vitrinas</h1>
        </div>
    </header>

    <section class="container px-4 px-lg-5 section-subida">
        <div class="row gx-5">
            <div class="col-md-6 mb-4">
                <div class="card card-custom p-4 shadow">
                    <h4 class="text-white text-center mb-4">Configurar Vitrina</h4>
                    
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label text-white-50 small">Altura (cm):</label>
                            <input type="number" class="form-control form-control-lg" id="altura" placeholder="0">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label text-white-50 small">Ancho (cm):</label>
                            <input type="number" class="form-control form-control-lg" id="ancho" placeholder="0">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-white-50 small d-block mb-2">Seleccione Material:</label>
                        
                        <div class="mb-3">
                            <span class="group-label">Aluminio</span>
                            <div class="d-flex flex-wrap gap-2">
                                <input type="radio" class="btn-check" name="tipoVitrina" id="vit_alum1" value="35" data-cat="aluminio" data-nombre="Aluminio 35" checked>
                                <label class="btn btn-outline-primary btn-sm" for="vit_alum1">Alum. 35 (S/. 35)</label>

                                <input type="radio" class="btn-check" name="tipoVitrina" id="vit_alum2" value="29" data-cat="aluminio" data-nombre="Aluminio 29">
                                <label class="btn btn-outline-primary btn-sm" for="vit_alum2">Alum. 29 (S/. 29)</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <span class="group-label">Vidrio</span>
                            <div class="d-flex flex-wrap gap-2">
                                <input type="radio" class="btn-check" name="tipoVitrina" id="vit_vid1" value="30" data-cat="vidrio" data-nombre="Vidrio 30">
                                <label class="btn btn-outline-primary btn-sm" for="vit_vid1">Vidrio 30 (S/. 30)</label>

                                <input type="radio" class="btn-check" name="tipoVitrina" id="vit_vid2" value="25" data-cat="vidrio" data-nombre="Vidrio 25">
                                <label class="btn btn-outline-primary btn-sm" for="vit_vid2">Vidrio 25 (S/. 25)</label>
                            </div>
                        </div>
                    </div>

                    <div class="text-center mb-4">
                        <h5 class="text-white bg-black p-3 rounded border border-secondary" id="resultado">Costo: S/. 0.00</h5>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg text-uppercase fw-bold" onclick="guardar()">Añadir a Pedido</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card card-custom p-4 shadow h-100">
                    <h4 class="text-white text-center mb-4">Resumen de Pedido</h4>
                    
                    <div style="max-height: 400px; overflow-y: auto;" class="px-2">
                        <h6 class="text-primary-custom border-bottom border-secondary pb-1 small text-uppercase">Aluminio:</h6>
                        <ul id="listaAluminio" class="list-unstyled mb-3 text-white-50 small"></ul>

                        <h6 class="text-primary-custom border-bottom border-secondary pb-1 small text-uppercase">Vidrio:</h6>
                        <ul id="listaVidrio" class="list-unstyled mb-3 text-white-50 small"></ul>
                    </div>

                    <div class="mt-auto pt-3 border-top border-secondary text-center">
                        <h4 id="totalAcumulado" class="text-white">Total: S/. 0.00</h4>
                        <button class="btn btn-sm btn-link text-danger mt-2 text-decoration-none" onclick="limpiar()">BORRAR TODO</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="contenedor-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu-dinamico.js"></script>
    <script src="footer-dinamico.js"></script>

    <script>
        let vitrinas = { aluminio: [], vidrio: [] };

        function calcular() {
            const h = parseFloat(document.getElementById('altura').value);
            const a = parseFloat(document.getElementById('ancho').value);
            const seleccionado = document.querySelector('input[name="tipoVitrina"]:checked');
            
            if (!h || !a || h <= 0 || a <= 0 || !seleccionado) return null;

            const precio = parseFloat(seleccionado.value);
            const catBase = seleccionado.getAttribute('data-cat');
            const nombre = seleccionado.getAttribute('data-nombre');

            const costo = ((h * a) / 900) * precio;
            return { h, a, costo, nombre, catBase };
        }

        document.addEventListener('input', () => {
            const m = calcular();
            document.getElementById('resultado').innerHTML = m ? `Costo: S/. ${m.costo.toFixed(2)}` : "Costo: S/. 0.00";
        });

        function guardar() {
            const data = calcular();
            if (data) {
                vitrinas[data.catBase].push(data);
                actualizarUI();
            } else {
                alert("Por favor, ingrese medidas válidas.");
            }
        }

        function actualizarUI() {
            const listas = { aluminio: 'listaAluminio', vidrio: 'listaVidrio' };
            let granTotal = 0;

            for (let cat in vitrinas) {
                const ul = document.getElementById(listas[cat]);
                ul.innerHTML = '';
                vitrinas[cat].forEach((v, i) => {
                    granTotal += v.costo;
                    const li = document.createElement('li');
                    li.className = "d-flex justify-content-between border-bottom border-dark py-2";
                    li.innerHTML = `<span><strong>${i+1}.</strong> ${v.nombre} (${v.a}x${v.h})</span> <span>S/. ${v.costo.toFixed(2)}</span>`;
                    ul.appendChild(li);
                });
            }
            document.getElementById('totalAcumulado').innerText = `Total: S/. ${granTotal.toFixed(2)}`;
        }

        function limpiar() {
            if(confirm("¿Desea vaciar la lista de vitrinas?")) {
                vitrinas = { aluminio: [], vidrio: [] };
                actualizarUI();
            }
        }
    </script>
</body>
</html>
